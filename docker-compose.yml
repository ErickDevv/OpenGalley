services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opengalley}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opengalley}
      POSTGRES_DB: ${POSTGRES_DB:-opengalley}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opengalley}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-opengalley}:${POSTGRES_PASSWORD:-opengalley}@postgres:5432/${POSTGRES_DB:-opengalley}
      DATA_DIR: /data
      PORT: 4000
    volumes:
      - projects:/data
    ports:
      - "4000:4000"

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  pgdata:
  projects:
